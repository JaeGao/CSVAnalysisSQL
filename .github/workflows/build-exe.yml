name: Build Executables

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact-name: CSV_Analyzer-windows
            executable: dist/CSV_Analyzer.exe
          - os: macos-latest
            artifact-name: CSV_Analyzer-macos
            executable: dist/CSV_Analyzer
          - os: ubuntu-latest
            artifact-name: CSV_Analyzer-linux
            executable: dist/CSV_Analyzer

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.pip
          pip install pyinstaller

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconsole --onefile --add-data "src\style.qss;." --add-data "src\grip_horizontal.png;." --add-data "src\grip_vertical.png;." --add-data "src\icon.png;." --icon "src\icon.ico" --name "CSV_Analyzer" src\main.py

      - name: Build executable (Unix)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --noconsole --onefile --add-data "src/style.qss:." --add-data "src/grip_horizontal.png:." --add-data "src/grip_vertical.png:." --add-data "src/icon.png:." --name "CSV_Analyzer" src/main.py

      - name: Make executable (Unix)
        if: runner.os != 'Windows'
        run: chmod +x dist/CSV_Analyzer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.executable }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.executable }}
